 <!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X 동영상 다운로더</title>
  <style>
    :root {
      --bg-color: #0f1419;
      --card-bg: #1e2732;
      --text-color: #e7e9ea;
      --primary-color: #1d9bf0;
      --border-color: #38444d;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--primary-color);
    }
    button {
      width: 100%;
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }
    button:active {
      opacity: 0.8;
    }
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    .queue-list {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background-color: #000;
    }
    .card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .status {
      font-size: 14px;
      font-weight: bold;
    }
    .status.waiting { color: #8899a6; }
    .status.loading { color: #ffad1f; }
    .status.success { color: #00ba7c; }
    .status.error { color: #f4212e; }
    
    .resolution {
      font-size: 12px;
      color: #8899a6;
    }
    /* 다운로드 진행 상태바 */
    .progress-track {
      width: 100%;
      height: 6px;
      background-color: var(--border-color);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary-color);
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <div class="container">
    <textarea id="linksInput" placeholder="여기에 X(트위터) 링크를 줄바꿈(Enter)으로 구분하여 입력하세요 (최대 40개)"></textarea>
    <button id="downloadBtn" onclick="startQueue()">동영상 다운로드 시작</button>
    <div class="queue-list" id="queueList"></div>
  </div>

  <script>
    const tx = document.getElementById('linksInput');
    tx.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    async function startQueue() {
      const input = document.getElementById('linksInput').value;
      const urls = input.split('\n')
                        .map(url => url.trim())
                        .filter(url => url.length > 0 && (url.includes('twitter.com') || url.includes('x.com')));

      if (urls.length === 0) {
        alert('올바른 X(트위터) 링크를 하나 이상 입력해주세요.');
        return;
      }

      const queueList = document.getElementById('queueList');
      const downloadBtn = document.getElementById('downloadBtn');
      
      queueList.innerHTML = '';
      downloadBtn.disabled = true;

      const queue = urls.map((url, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumbnail" id="thumb-${index}"></div>
          <div class="card-info">
            <div class="status waiting" id="status-${index}">[대기중] 순서를 기다리는 중...</div>
            <div class="resolution" id="res-${index}">-</div>
            <div class="progress-track"><div class="progress-bar" id="bar-${index}"></div></div>
          </div>
        `;
        queueList.appendChild(card);
        return { url, index };
      });

      // 순차적으로 하나씩 완전히 끝날 때까지 대기하며 실행
      for (let i = 0; i < queue.length; i++) {
        await processDownload(queue[i].url, queue[i].index);
      }

      downloadBtn.disabled = false;
      alert('모든 다운로드 작업이 완료되었습니다!');
    }

    async function processDownload(url, index) {
      const statusText = document.getElementById(`status-${index}`);
      const progressBar = document.getElementById(`bar-${index}`);
      const resText = document.getElementById(`res-${index}`);
      const thumbDiv = document.getElementById(`thumb-${index}`);

      statusText.innerText = "[분석중] 링크 우회 분석 중...";
      statusText.className = "status loading";

      try {
        // 1. 서버리스 함수 호출하여 고화질 비디오 링크 획득
        const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "분석 실패");
        }

        // 화면 갱신
        if (result.thumbnail) {
          thumbDiv.innerHTML = `<img src="${result.thumbnail}" class="thumbnail" alt="썸네일">`;
        }
        resText.innerText = `화질: ${result.resolution}`;
        statusText.innerText = "[다운로드중] 파일 요청 중...";

        // 2. 실제 파일 스트림 다운로드 수행 (CORS 우회 다운로드)
        await downloadFileHelper(result.videoUrl, `X_video_${Date.now()}.mp4`, index);

      } catch (error) {
        statusText.innerText = `[오류] ${error.message}`;
        statusText.className = "status error";
        progressBar.style.width = "0%";
      }
    }

    // 파일을 블롭으로 내려받아 강제 기기 저장을 수행하는 핵심 함수
    async function downloadFileHelper(videoUrl, filename, index) {
      const statusText = document.getElementById(`status-${index}`);
      const progressBar = document.getElementById(`bar-${index}`);

      try {
        const fileResponse = await fetch(videoUrl);
        if (!fileResponse.ok) throw new Error("파일 다운로드 응답 실패");

        const contentLength = fileResponse.headers.get('content-length');
        const totalBytes = contentLength ? parseInt(contentLength, 10) : 0;
        
        const reader = fileResponse.body.getReader();
        let receivedBytes = 0;
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          chunks.push(value);
          receivedBytes += value.length;

          if (totalBytes > 0) {
            const percent = Math.round((receivedBytes / totalBytes) * 100);
            progressBar.style.width = `${percent}%`;
            statusText.innerText = `[다운로드중] 파일 받는 중... (${percent}%)`;
          }
        }

        // 가상 Blob 파일 생성 및 즉시 다운로드 처리
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const blobUrl = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);

        statusText.innerText = "[완료] 기기에 저장 완료";
        statusText.className = "status success";

      } catch (e) {
        console.warn("Blob 다운로드 실패, 우회 새창 열기로 시도합니다.", e);
        
        // 브라우저 환경에 따라 Blob 차단 시 대체 수단 (안전 장치)
        statusText.innerText = "[오류] 직접 다운로드 실패. 새창에서 길게 눌러 저장하세요.";
        statusText.className = "status error";
        
        const a = document.createElement('a');
        a.href = videoUrl;
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noreferrer'); // 403 오류 우회용
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    }
  </script>
</body>
</html>
