<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Downloader</title>
  <style>
    :root {
      /* 1. 라이트 모드 기준 색상 적용 */
      --bg-color: #ffffff;
      --text-color: #333333;
      --card-bg: #d9f3ff; /* 6. 카드 배경색 */
      --card-border: #366593; /* 6. 카드 테두리색 */
      --primary-color: #7293bc; /* 3,4. 메인 테마색 */
      --button-text: #f3faff; /* 4. 다운로드 버튼 글자색 */
      --input-bg: #f5f5f5; /* 5. 입력창 내부 배경 (아주 연한 회색) */
      --input-border: #a0a0a0; /* 5. 입력창 테두리 (중간 회색) */
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* 2. 입력창 전체 영역을 아래로 조정 */
    .container {
      width: 100%;
      max-width: 500px;
      margin-top: 40px; /* 상단 여백 추가 */
    }
    /* 3. 좌상단 타이틀 설정 */
    .header {
      color: var(--primary-color);
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 20px 0;
      text-align: left;
    }
    /* 9. 입력창과 지우기 버튼을 감싸는 래퍼 */
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    /* 5. 입력창 스타일 변경 */
    textarea {
      width: 100%;
      min-height: 120px;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--input-border);
      border-radius: 12px; /* 가장자리 둥글게 */
      padding: 14px 44px 14px 14px; /* 우측에 지우기 버튼 공간 마련 */
      box-sizing: border-box;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--primary-color);
    }
    /* 9. 휴지통 지우기 버튼 스타일 */
    .clear-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background-color 0.2s;
    }
    .clear-btn:active {
      background-color: rgba(114, 147, 188, 0.1);
    }
    /* 4. 다운로드 버튼 스타일 변경 */
    button#downloadBtn {
      width: 100%;
      background-color: var(--primary-color);
      color: var(--button-text);
      border: none;
      border-radius: 25px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
      cursor: pointer;
    }
    button#downloadBtn:active {
      opacity: 0.9;
    }
    button#downloadBtn:disabled {
      background-color: #cccccc;
      color: #ffffff;
      cursor: not-allowed;
    }
    .queue-list {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* 6. 카드 디자인 변경 */
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-sizing: border-box;
    }
    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background-color: #fff;
      border: 1px solid #cce3f0;
    }
    .card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* 8. 카드 글자색 일괄 조정 및 상태별 컬러 변경 */
    .status {
      font-size: 14px;
      font-weight: bold;
      color: #555555; /* 카드 내부의 기본 글자색 (진회색) */
    }
    .status.waiting { 
      color: #666666; /* 대기중 진회색 */
    } 
    .status.loading { 
      color: #005dab; /* 8. 다운로드 중인 것 파란색 */
    } 
    .status.success { 
      color: #e66d9b; /* 8. 완료된 것 분홍색 */
    } 
    .status.error { 
      color: #f4212e; 
    }
    
    .resolution {
      font-size: 12px;
      color: #555555; /* 8. 진회색 */
    }
    /* 7. 게이지 디자인 변경 (회색 트랙에서 #366593으로 차오름) */
    .progress-track {
      width: 100%;
      height: 6px;
      background-color: #e0e0e0; /* 7. 트랙 배경 회색 */
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #366593; /* 7. 차오르는 게이지색 */
      transition: width 0.1s linear;
    }
    .retry-btn {
      background-color: #e66d9b;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      margin-top: 6px;
      width: fit-content;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 3. 좌상단 타이틀 -->
    <div class="header">X Downloader</div>
    
    <!-- 9. 입력 영역 및 전체 지우기 버튼 -->
    <div class="input-wrapper">
      <textarea id="linksInput" placeholder="여기에 X(트위터) 링크를 줄바꿈(Enter)으로 구분하여 입력하세요 (최대 40개)"></textarea>
      <button class="clear-btn" onclick="clearInput()" title="전체 지우기">
        <!-- 깔끔한 테마 매칭 SVG 휴지통 아이콘 -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7293bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
    
    <button id="downloadBtn" onclick="startQueue()">동영상 다운로드 시작</button>
    <div class="queue-list" id="queueList"></div>
  </div>

  <script>
    const tx = document.getElementById('linksInput');
    tx.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    // 9. 입력창 전체 지우기 함수
    function clearInput() {
      const linksInput = document.getElementById('linksInput');
      linksInput.value = '';
      linksInput.style.height = '120px'; // 최소 기본 높이로 복원
    }

    async function startQueue() {
      const input = document.getElementById('linksInput').value;
      const urls = input.split('\n')
                        .map(url => url.trim())
                        .filter(url => url.length > 0 && (url.includes('twitter.com') || url.includes('x.com')));

      if (urls.length === 0) {
        alert('올바른 X(트위터) 링크를 하나 이상 입력해주세요.');
        return;
      }

      const queueList = document.getElementById('queueList');
      const downloadBtn = document.getElementById('downloadBtn');
      
      queueList.innerHTML = '';
      downloadBtn.disabled = true;

      const queue = urls.map((url, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumbnail" id="thumb-${index}"></div>
          <div class="card-info" id="info-${index}">
            <div class="status waiting" id="status-${index}">[대기중] 순서를 기다리는 중...</div>
            <div class="resolution" id="res-${index}">-</div>
            <div class="progress-track"><div class="progress-bar" id="bar-${index}"></div></div>
          </div>
        `;
        queueList.appendChild(card);
        return { url, index };
      });

      for (let i = 0; i < queue.length; i++) {
        await processDownload(queue[i].url, queue[i].index);
      }

      downloadBtn.disabled = false;
      alert('모든 링크 분석 및 다운로드 시도가 완료되었습니다!');
    }

    async function processDownload(url, index) {
      const statusText = document.getElementById(`status-${index}`);
      const progressBar = document.getElementById(`bar-${index}`);
      const resText = document.getElementById(`res-${index}`);
      const thumbDiv = document.getElementById(`thumb-${index}`);

      statusText.innerText = "[분석중] 링크 우회 분석 중...";
      statusText.className = "status loading";

      try {
        const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "분석 실패");
        }

        if (result.thumbnail) {
          thumbDiv.innerHTML = `<img src="${result.thumbnail}" class="thumbnail" alt="썸네일">`;
        }
        resText.innerText = `화질: ${result.resolution}`;
        statusText.innerText = "[다운로드중] 파일 요청 중...";

        const proxiedUrl = `/api/proxy?url=${encodeURIComponent(result.videoUrl)}`;
        await downloadFileHelper(proxiedUrl, `X_video_${Date.now()}.mp4`, index);

      } catch (error) {
        statusText.innerText = `[오류] ${error.message}`;
        statusText.className = "status error";
        progressBar.style.width = "0%";
      }
    }

    async function downloadFileHelper(proxiedUrl, filename, index) {
      const statusText = document.getElementById(`status-${index}`);
      const progressBar = document.getElementById(`bar-${index}`);
      const cardInfo = document.getElementById(`info-${index}`);

      try {
        const fileResponse = await fetch(proxiedUrl);
        if (!fileResponse.ok) throw new Error("네트워크 연결 시간 초과 또는 서버 응답 실패");

        const contentLength = fileResponse.headers.get('content-length');
        const totalBytes = contentLength ? parseInt(contentLength, 10) : 0;
        
        const reader = fileResponse.body.getReader();
        let receivedBytes = 0;
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          chunks.push(value);
          receivedBytes += value.length;

          if (totalBytes > 0) {
            const percent = Math.round((receivedBytes / totalBytes) * 100);
            progressBar.style.width = `${percent}%`;
            statusText.innerText = `[다운로드중] 파일 받는 중... (${percent}%)`;
          }
        }

        const blob = new Blob(chunks, { type: 'video/mp4' });
        const blobUrl = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);

        statusText.innerText = "[완료] 기기에 저장 완료";
        statusText.className = "status success";

      } catch (e) {
        console.warn("직접 다운로드 실패:", e);
        
        statusText.innerText = "[시간초과] 직접 다운로드 실패";
        statusText.className = "status error";
        progressBar.style.width = "0%";

        const btnId = `retry-btn-${index}`;
        if (!document.getElementById(btnId)) {
          const retryBtn = document.createElement('button');
          retryBtn.id = btnId;
          retryBtn.className = 'retry-btn';
          retryBtn.innerText = "수동 다운로드 버튼 누르기";
          retryBtn.onclick = function() {
            const a = document.createElement('a');
            a.href = proxiedUrl;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };
          cardInfo.appendChild(retryBtn);
        }
      }
    }
  </script>
</body>
</html>
