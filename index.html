<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Downloader</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --primary-color: #7293bc; 
      --button-text: #f3faff; 
      --input-bg: #f5f5f5; 
      --input-border: #a0a0a0; 
      
      --badge-waiting: #888888; 
      --badge-loading: #23496d; 
      --badge-success: #ba8093; 
      --badge-text: #f5f5f5; 
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      margin-top: 40px;
    }
    .header {
      color: var(--primary-color);
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 20px 0;
      text-align: left;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 42px; 
      min-height: 42px;
      max-height: 128px; 
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 10px 44px 10px 14px; 
      box-sizing: border-box;
      font-size: 14px;
      line-height: 20px;
      resize: none;
      outline: none;
      overflow-y: hidden; 
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--primary-color);
    }
    .clear-btn {
      position: absolute;
      top: 7px; 
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .clear-btn:active {
      background-color: rgba(114, 147, 188, 0.1);
    }
    button#downloadBtn {
      display: block;
      width: fit-content;
      margin: 18px auto 0 auto;
      background-color: var(--primary-color);
      color: var(--button-text);
      border: none;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    button#downloadBtn:active {
      opacity: 0.9;
    }
    button#downloadBtn:disabled {
      background-color: #cccccc;
      color: #ffffff;
      cursor: not-allowed;
    }
    
    .queue-list {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      width: 100%;
    }
    .card {
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px; 
      box-sizing: border-box;
      text-align: center;
      position: relative;
    }
    .thumb-box {
      width: 100%;
      aspect-ratio: 1 / 1; 
      border-radius: 6px;
      background-color: #e0e0e0;
      overflow: hidden;
    }
    .thumb-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .resolution {
      font-size: 10px;
      color: #666666;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .status {
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      display: inline-block;
      width: auto;
      max-width: 95%;
      box-sizing: border-box;
      white-space: nowrap;
      text-align: center;
    }
    .status.waiting { 
      background-color: var(--badge-waiting);
      color: var(--badge-text);
    } 
    .status.loading { 
      background-color: var(--badge-loading);
      color: var(--badge-text);
    } 
    .status.success { 
      background-color: var(--badge-success);
      color: var(--badge-text);
    } 
    .status.error { 
      background-color: #f4212e;
      color: #ffffff;
      font-size: 9px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">X Downloader</div>
    
    <div class="input-wrapper">
      <textarea id="linksInput" placeholder="URL을 입력하세요"></textarea>
      <button class="clear-btn" onclick="clearInput()" title="전체 지우기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7293bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
    
    <button id="downloadBtn" onclick="startQueue()">동영상 다운로드 시작</button>
    <div class="queue-list" id="queueList"></div>
  </div>

  <script>
    const tx = document.getElementById('linksInput');
    
    function adjustHeight() {
      tx.style.height = 'auto';
      let scrollHeight = tx.scrollHeight;
      
      if (scrollHeight > 128) {
        tx.style.height = '128px';
        tx.style.overflowY = 'auto';
      } else {
        tx.style.height = scrollHeight + 'px';
        tx.style.overflowY = 'hidden';
      }
    }

    // 모바일 클립보드 및 키보드 자동 줄바꿈 100% 감지 로직
    tx.addEventListener('input', function() {
      adjustHeight();
      
      const val = tx.value;
      // 트위터/X 주소 끝부분에 공백이나 줄바꿈이 없으면 강제로 줄바꿈을 즉시 추가
      const twitterRegex = /https?:\/\/(twitter|x)\.com\/[a-zA-Z0-9_]+\/status\/\d+[^ \n]*$/;
      if (twitterRegex.test(val)) {
        tx.value = val + '\n';
        adjustHeight();
        tx.scrollTop = tx.scrollHeight;
      }
    });

    function clearInput() {
      const linksInput = document.getElementById('linksInput');
      linksInput.value = '';
      linksInput.style.height = '42px';
      linksInput.style.overflowY = 'hidden';
    }

    // 전역 대기 큐 배열
    let downloadQueue = [];

    async function startQueue() {
      const input = document.getElementById('linksInput').value;
      const urls = input.split('\n')
                        .map(url => url.trim())
                        .filter(url => url.length > 0 && (url.includes('twitter.com') || url.includes('x.com')));

      if (urls.length === 0) {
        alert('올바른 X(트위터) 링크를 하나 이상 입력해주세요.');
        return;
      }

      const queueList = document.getElementById('queueList');
      const downloadBtn = document.getElementById('downloadBtn');
      
      queueList.innerHTML = '';
      downloadBtn.disabled = true;
      downloadQueue = [];

      // 1단계: 초기 링크 개수만큼 placeholder 카드 미리 생성
      urls.forEach((url, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.innerHTML = `
          <div class="thumb-box" id="thumb-${index}"></div>
          <div class="resolution" id="res-${index}">대기중</div>
          <span class="status waiting" id="status-${index}">대기중</span>
        `;
        queueList.appendChild(card);
        downloadQueue.push({ url, index, isPlaceholder: true });
      });

      // 2단계: 순차 처리 엔진 가동
      for (let i = 0; i < downloadQueue.length; i++) {
        const item = downloadQueue[i];
        if (item.isPlaceholder) {
          await processLink(item.url, item.index);
        }
      }

      downloadBtn.disabled = false;
    }

    async function processLink(url, originalIndex) {
      const statusText = document.getElementById(`status-${originalIndex}`);
      const resText = document.getElementById(`res-${originalIndex}`);
      const thumbDiv = document.getElementById(`thumb-${originalIndex}`);
      const originalCard = document.getElementById(`card-${originalIndex}`);

      statusText.innerText = "분석중";
      statusText.className = "status loading";

      try {
        const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "분석 실패");
        }

        const videos = result.videos || [];
        if (videos.length === 0) {
          throw new Error("영상을 찾을 수 없음");
        }

        // 발견된 첫 번째 영상으로 원래의 카드 슬롯 업데이트
        const firstVideo = videos[0];
        if (firstVideo.thumbnail) {
          thumbDiv.innerHTML = `<img src="${firstVideo.thumbnail}" alt="썸네일">`;
        }
        resText.innerText = firstVideo.resolution;
        
        const firstProxiedUrl = `/api/proxy?url=${encodeURIComponent(firstVideo.videoUrl)}`;
        await triggerIframeDownload(firstProxiedUrl, originalCard, statusText);

        // 한 트윗 안에 동영상이 여러 개(2개 이상) 있는 경우 카드 동적 추가 생성
        if (videos.length > 1) {
          let lastInsertedCard = originalCard;
          for (let k = 1; k < videos.length; k++) {
            const extraVideo = videos[k];
            const extraIndex = `${originalIndex}_sub_${k}`;
            
            const extraCard = document.createElement('div');
            extraCard.className = 'card';
            extraCard.id = `card-${extraIndex}`;
            extraCard.innerHTML = `
              <div class="thumb-box" id="thumb-${extraIndex}">
                <img src="${extraVideo.thumbnail}" alt="썸네일">
              </div>
              <div class="resolution" id="res-${extraIndex}">${extraVideo.resolution}</div>
              <span class="status waiting" id="status-${extraIndex}">다운중</span>
            `;
            
            // 그리드 레이아웃상 원래 카드 바로 뒤에 차례대로 삽입합니다.
            lastInsertedCard.after(extraCard);
            lastInsertedCard = extraCard;

            // 추가 카드 다운로드 실행 및 1.5초 안정화 딜레이 대기
            const extraProxiedUrl = `/api/proxy?url=${encodeURIComponent(extraVideo.videoUrl)}`;
            await triggerIframeDownload(extraProxiedUrl, extraCard, document.getElementById(`status-${extraIndex}`));
            await new Promise(resolve => setTimeout(resolve, 1500));
          }
        } else {
          // 영상이 1개인 경우 일반적인 순서 안정을 위해 1.5초 대기
          await new Promise(resolve => setTimeout(resolve, 1500));
        }

      } catch (error) {
        statusText.innerText = "오류 (클릭)";
        statusText.className = "status error";
        resText.innerText = "에러 발생";
      }
    }

    // 모바일 브라우저의 다운로드 누락을 방지하는 숨겨진 Iframe 무한 다운로드 공법
    async function triggerIframeDownload(proxiedUrl, cardElement, statusElement) {
      statusElement.innerText = "다운중";
      statusElement.className = "status loading";

      // 보이지 않는 가상 iframe 생성 후 바디에 탑재하여 강제 다운로드 작동
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = proxiedUrl;
      document.body.appendChild(iframe);

      // 브라우저의 다운로드 트리거 완료 시점 설정 및 클릭 재다운로드 맵핑
      setTimeout(() => {
        statusElement.innerText = "완료!";
        statusElement.className = "status success";
        cardElement.style.cursor = "pointer";
        cardElement.onclick = function() {
          triggerIframeDownload(proxiedUrl, cardElement, statusElement);
        };
        document.body.removeChild(iframe);
      }, 1000);
    }
  </script>
</body>
</html>
