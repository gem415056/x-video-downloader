<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Downloader</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --primary-color: #7293bc; 
      --button-text: #f3faff; 
      --input-bg: #f5f5f5; 
      --input-border: #a0a0a0; 
      
      --badge-waiting: #888888; 
      --badge-loading: #23496d; 
      --badge-success: #ba8093; 
      --badge-text: #f5f5f5; 
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      margin-top: 40px;
    }
    .header {
      color: var(--primary-color);
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 20px 0;
      text-align: left;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 42px; 
      min-height: 42px;
      max-height: 128px; 
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 10px 44px 10px 14px; 
      box-sizing: border-box;
      font-size: 14px;
      line-height: 20px;
      resize: none;
      outline: none;
      overflow-y: hidden; 
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--primary-color);
    }
    .clear-btn {
      position: absolute;
      top: 7px; 
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .clear-btn:active {
      background-color: rgba(114, 147, 188, 0.1);
    }
    button#downloadBtn {
      display: block;
      width: fit-content;
      margin: 18px auto 0 auto;
      background-color: var(--primary-color);
      color: var(--button-text);
      border: none;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    button#downloadBtn:active {
      opacity: 0.9;
    }
    button#downloadBtn:disabled {
      background-color: #cccccc;
      color: #ffffff;
      cursor: not-allowed;
    }
    
    .queue-list {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      width: 100%;
    }
    .card {
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px; 
      box-sizing: border-box;
      text-align: center;
      position: relative;
    }
    .thumb-box {
      width: 100%;
      aspect-ratio: 1 / 1; 
      border-radius: 6px;
      background-color: #e0e0e0;
      overflow: hidden;
    }
    .thumb-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .resolution {
      font-size: 10px;
      color: #666666;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .status {
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      display: inline-block;
      width: auto;
      max-width: 95%;
      box-sizing: border-box;
      white-space: nowrap;
      text-align: center;
    }
    .status.waiting { 
      background-color: var(--badge-waiting);
      color: var(--badge-text);
    } 
    .status.loading { 
      background-color: var(--badge-loading);
      color: var(--badge-text);
    } 
    .status.success { 
      background-color: var(--badge-success);
      color: var(--badge-text);
    } 
    .status.error { 
      background-color: #f4212e;
      color: #ffffff;
      font-size: 9px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">X Downloader</div>
    
    <div class="input-wrapper">
      <textarea id="linksInput" placeholder="URL을 입력하세요"></textarea>
      <button class="clear-btn" onclick="clearInput()" title="전체 지우기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7293bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
    
    <button id="downloadBtn" onclick="startQueue()">동영상 다운로드 시작</button>
    <div class="queue-list" id="queueList"></div>
  </div>

  <script>
    const tx = document.getElementById('linksInput');
    
    function adjustHeight() {
      tx.style.height = 'auto';
      let scrollHeight = tx.scrollHeight;
      
      if (scrollHeight > 128) {
        tx.style.height = '128px';
        tx.style.overflowY = 'auto';
      } else {
        tx.style.height = scrollHeight + 'px';
        tx.style.overflowY = 'hidden';
      }
    }
    tx.addEventListener('input', adjustHeight);

    // [신규 기능] 붙여넣기 시 자동으로 줄바꿈(엔터) 추가하는 이벤트 핸들러
    tx.addEventListener('paste', function(e) {
      // 브라우저의 기본 붙여넣기 동작을 가로챕니다.
      e.preventDefault();
      
      const clipboardData = e.clipboardData || window.clipboardData;
      const pastedText = clipboardData.getData('Text').trim();
      
      if (pastedText) {
        // 현재 입력창에 글이 있고, 마지막 글자가 줄바꿈(\n)이 아니면 강제로 줄바꿈을 먼저 추가합니다.
        if (tx.value && !tx.value.endsWith('\n')) {
          tx.value += '\n';
        }
        
        // 붙여넣은 텍스트 뒤에 자동으로 줄바꿈(\n)을 덧붙여 입력창에 추가합니다.
        tx.value += pastedText + '\n';
        
        // 입력창 높이 재계산 및 스크롤을 맨 아래로 이동
        adjustHeight();
        tx.scrollTop = tx.scrollHeight;
      }
    });

    function clearInput() {
      const linksInput = document.getElementById('linksInput');
      linksInput.value = '';
      linksInput.style.height = '42px';
      linksInput.style.overflowY = 'hidden';
    }

    async function startQueue() {
      const input = document.getElementById('linksInput').value;
      const urls = input.split('\n')
                        .map(url => url.trim())
                        .filter(url => url.length > 0 && (url.includes('twitter.com') || url.includes('x.com')));

      if (urls.length === 0) {
        alert('올바른 X(트위터) 링크를 하나 이상 입력해주세요.');
        return;
      }

      const queueList = document.getElementById('queueList');
      const downloadBtn = document.getElementById('downloadBtn');
      
      queueList.innerHTML = '';
      downloadBtn.disabled = true;

      const queue = urls.map((url, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.innerHTML = `
          <div class="thumb-box" id="thumb-${index}"></div>
          <div class="resolution" id="res-${index}">-</div>
          <span class="status waiting" id="status-${index}">대기중</span>
        `;
        queueList.appendChild(card);
        return { url, index };
      });

      for (let i = 0; i < queue.length; i++) {
        await processDownload(queue[i].url, queue[i].index);
      }

      downloadBtn.disabled = false;
      alert('모든 링크 분석 및 다운로드 시도가 완료되었습니다!');
    }

    async function processDownload(url, index) {
      const statusText = document.getElementById(`status-${index}`);
      const resText = document.getElementById(`res-${index}`);
      const thumbDiv = document.getElementById(`thumb-${index}`);

      statusText.innerText = "분석중";
      statusText.className = "status loading";

      try {
        const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "분석 실패");
        }

        if (result.thumbnail) {
          thumbDiv.innerHTML = `<img src="${result.thumbnail}" alt="썸네일">`;
        }
        resText.innerText = result.resolution;
        statusText.innerText = "다운중";

        const proxiedUrl = `/api/proxy?url=${encodeURIComponent(result.videoUrl)}`;
        await downloadFileHelper(proxiedUrl, `X_video_${Date.now()}.mp4`, index);

      } catch (error) {
        statusText.innerText = "오류 (클릭)";
        statusText.className = "status error";
      }
    }

    async function downloadFileHelper(proxiedUrl, filename, index) {
      const statusText = document.getElementById(`status-${index}`);
      const card = document.getElementById(`card-${index}`);

      try {
        const fileResponse = await fetch(proxiedUrl);
        if (!fileResponse.ok) throw new Error("서버 응답 실패");

        const reader = fileResponse.body.getReader();
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          statusText.innerText = "다운중";
        }

        const blob = new Blob(chunks, { type: 'video/mp4' });
        const blobUrl = URL.createObjectURL(blob);

        setTimeout(() => {
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }, 100);

        statusText.innerText = "완료!";
        statusText.className = "status success";
        card.style.cursor = "pointer";
        
        card.onclick = function() {
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };

      } catch (e) {
        console.warn("직접 다운로드 실패:", e);
        
        statusText.innerText = "오류 (클릭)";
        statusText.className = "status error";
        card.style.cursor = "pointer";
        
        card.onclick = function() {
          const a = document.createElement('a');
          a.href = proxiedUrl;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };
      }
    }
  </script>
</body>
</html>
